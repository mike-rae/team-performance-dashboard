services:

  exporter:
    build: .
    container_name: github-exporter

    env_file:
      - .env

    ports:
      - "2112:2112"

  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - exporter
